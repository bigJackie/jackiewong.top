[build]
	command = "pnpm build"
	publish = "dist"

[[headers]]
	for = "/assets/*"
	[headers.values]
		Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
	for = "/images/*"
	[headers.values]
		Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
	for = "/files/*"
	[headers.values]
		Cache-Control = "public, max-age=604800"

[[headers]]
	for = "/*.html"
	[headers.values]
		Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
	from = "/*"
	to = "/index.html"
	status = 200
